services:
  kg-schema-docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-microbe-kb-mcp
    ports:
      - "${PORT:-8031}:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - TRANSPORT=sse
    restart: unless-stopped
    # Optional: Add health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/sse || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
